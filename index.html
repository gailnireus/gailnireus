<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAILNIREUS</title>
<style>
  /* === Theme UI Gelap GAILNIREUS === */
body {
  margin: 0;
  background: #000;
  color: #888;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 2em;
  font-weight: bold;
  color: #aaa;
}

main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
}

footer {
  background: #111;
  padding: 15px;
  text-align: center;
}

.menu button {
  background: none;
  border: none;
  color: #888;
  font-size: 1em;
  margin: 0 15px;
  cursor: pointer;
  transition: color 0.3s;
}

.menu button:hover {
  color: #f39c12;
}

/* === Image Map & Canvas === */
img, canvas {
  display: block;
  margin: 20px auto;
  border: 1px solid #333;
  background: #111; /* fallback background */
}

/* === Tooltip (versi sebelumnya, optional jika mau hover tooltip juga) === */
#tooltip {
  position: absolute;
  background: #222;
  color: #fff;
  padding: 5px 10px;
  border-radius: 5px;
  font-size: 0.9em;
  pointer-events: none;
  display: none;
  z-index: 1000;
}

/* === Modal Box === */
#modal {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  color: #fff;
  padding: 20px;
  border-radius: 10px;
  border: 1px solid #888;
  z-index: 10000;
  width: 300px;
  box-shadow: 0 0 15px #000;
}

#modal h3 {
  margin-top: 0;
}

#modal button {
  background: #222;
  color: #fff;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
  margin-top: 10px;
  border-radius: 5px;
  transition: background 0.3s;
}

#modal button:hover {
  background: #333;
}

/* === Highlight overlay canvas === */
#highlightCanvas {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
}

</style>

</head>
<body>

  <header>gailnireus</header>

  <main id="content">
    <h1>welcome</h1>
  </main>

  <footer>
    <div class="menu">
      <button onclick="showPage('home')">home</button>
      <button onclick="showPage('e')">e</button>
      <button onclick="showPage('x')">x</button>
      <button onclick="showPage('v')">v</button>
      <button onclick="showPage('w')">w</button>
      <button onclick="showPage('z')">z</button>
      <button onclick="showPage('about')">about</button>
    </div>
  </footer>

  <!-- JS utama & page JS berasingan -->
  <script src="js/main.js"></script>
  <script src="js/e.js"></script>
  <script src="js/x.js"></script>
  <script src="js/v.js"></script>
  <script src="js/w.js"></script>
  <script src="js/z.js"></script>

</body>
</html>
