<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gailnireus</title>
<style>
  body {
    margin:0;
    padding:0;
    background:#000;
    color:#888;
    font-family:monospace;
    text-transform: lowercase;
    display:flex;
    flex-direction:column;
    height:100vh;
    align-items:center;
    justify-content:space-between;
  }
  h1 {
    text-align:center;
    margin-top:10px;
  }
  #content {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2em;
    width:100%;
  }
  #menu {
    display:flex;
    gap:20px;
    margin-bottom:10px;
  }
  .btn {
    cursor:pointer;
    color:#888;
    text-decoration:none;
  }
  .btn:hover { color:#fff; }
</style>
</head>
<body>

<h1>gailnireus</h1>

<div id="content">welcome</div>

<div id="menu">
  <span class="btn" onclick="loadPage('x')">x</span>
  <span class="btn" onclick="loadPage('e')">e</span>
  <span class="btn" onclick="loadPage('v')">v</span>
</div>

<!-- LOAD DATA & LOGIC -->
<script src="js/v-sc.js"></script> <!-- specialCells -->
<script src="js/x.js"></script>
<script src="js/e.js"></script>
<script src="js/v.js"></script>

<script>
  function loadPage(p){
    if(p==='x'){ showX(); }
    if(p==='e'){ showE(); }
    if(p==='v'){ showV(); }
  }
</script>

</body>
</html>
