<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAILNIREUS</title>
  <style>
    /* Theme UI Asal */
    body {
      margin: 0;
      background: #000;    /* gelap */
      color: #888;         /* teks abu-abu */
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      color: #aaa;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    footer {
      background: #111;
      padding: 15px;
      text-align: center;
    }

    .menu button {
      background: none;
      border: none;
      color: #888;
      font-size: 1em;
      margin: 0 15px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .menu button:hover {
      color: #f39c12;
    }

    canvas {
      display: block;
      margin: 20px auto;
      border: 1px solid #333;
      background: #111;   /* canvas ikut theme */
    }
  </style>
</head>
<body>

  <header>GAILNIREUS</header>

  <main id="content">
    <h1>Welcome</h1>
    <p>Ini laman utama untuk projek GAILNIREUS.</p>
  </main>

  <footer>
    <div class="menu">
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('e')">e</button>
      <button onclick="showPage('x')">x</button>
      <button onclick="showPage('v')">v</button>
      <button onclick="showPage('w')">w</button>
      <button onclick="showPage('z')">z</button>
      <button onclick="showPage('about')">About</button>
    </div>
  </footer>

  <!-- JS utama & page JS berasingan -->
  <script src="js/main.js"></script>
  <script src="js/e.js"></script>
  <script src="js/x.js"></script>
  <script src="js/v.js"></script>
  <script src="js/w.js"></script>
  <script src="js/z.js"></script>

</body>
</html>
