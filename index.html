<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gailnireus</title>
<link rel="icon" type="image/jpeg" href="images/gnlogo.jpeg">
<style>
  body {
    margin:0;
    padding:0;
    background:#000;
    color:#888;
    font-family:monospace;
    text-transform: lowercase;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }
  h1 {
    position:sticky;
    top:0;
    background:#000;
    margin:0;
    padding:10px;
    text-align:center;
    z-index:10;
  }
  #content {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1em;
    width:100%;
    overflow:auto;
  }
  .map {
    position:relative;
    width:90vw;
    max-width:660px;
    aspect-ratio:1 / 1;
    display:grid;
    background:#000;
    border:1px solid #888;
    grid-template-rows: repeat(70,1fr);
    grid-template-columns: repeat(70,1fr);
  }
  .cell {
    width:100%;
    height:100%;
    border:1px solid #444;
    cursor:pointer;
  }
  #tooltip {
    position:fixed;
    padding:4px 8px;
    background:#111;
    color:#fff;
    font-size:12px;
    pointer-events:none;
    border:1px solid #888;
    display:none;
    z-index:1000;
    white-space:pre;
  }
</style>
</head>
<body>

<h1>gailnireus</h1>
<div id="content">
  <div class="map" id="map"></div>
</div>
<div id="tooltip"></div>

<script src="js/e.js"></script>
</body>
</html>
