<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gailnireus</title>
<link rel="icon" type="image/png" href="images/gnlogo2.png"> <!-- favicon/tab logo -->
<style>
  body {
    margin:0;
    padding:0;
    background:#000;
    color:#888;
    font-family:monospace;
    text-transform: lowercase;
    display:flex;
    flex-direction:column;
    height:100vh;
    align-items:center;
    justify-content:space-between;
  }
  h1 {
    position: sticky;
    top: 0;
    background: #000;
    text-align: center;
    margin: 0;
    padding: 12px 0;
    font-size: 1.2em;
    border-bottom: 1px solid #111;
    z-index: 10;
  }
  #content {
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2em;
    width:100%;
    text-align:center;
  }
  #menu {
   position: sticky;
    bottom: 0;
    background: #000;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 12px 0;
    border-top: 1px solid #111;
    z-index: 10;
  }
  .btn {
    cursor:pointer;
    color:#888;
    text-decoration:none;
  }
  .btn:hover { color:#fff; }
  
   /* === MOBILE FOCUS === */
  @media (min-width: 600px) {
    body {
      max-width: 780px;
      margin: 0 auto;
    }
  }
</style>
</head>
<body>

<h1>gailnireus</h1>

<div id="content">welcome</div>

<div id="menu">
  <span class="btn" onclick="loadPage('e')">e</span>
</div>

<!-- LOAD DATA & LOGIC -->
<script src="js/e-sc.js"></script> <!-- specialCells -->
<script src="js/e.js"></script>

<script>
  function loadPage(p){
    // simpan page current
    localStorage.setItem('currentPage', p);

    if(p==='e'){ showE(); }
    
  }

  // bila page reload, check last saved page
  window.addEventListener('DOMContentLoaded', ()=>{
    const last = localStorage.getItem('currentPage');
    if(last){
      loadPage(last); // buka balik page last
    } else {
      document.getElementById('content').innerText = 'welcome';
    }
  });
</script>

</body>
</html>
