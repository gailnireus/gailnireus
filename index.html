<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAILNIREUS</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #888;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 2em;
      font-weight: bold;
      color: #aaa;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    footer {
      background: #111;
      padding: 15px;
      text-align: center;
    }

    .menu button {
      background: none;
      border: none;
      color: #888;
      font-size: 1em;
      margin: 0 15px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .menu button:hover {
      color: #f39c12;
    }
  </style>
</head>
<body>

  <header>gailnireus</header>

  <main id="content">
    <h1>Welcome</h1>
  </main>

  <footer>
    <div class="menu">
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('e')">e</button>
      <button onclick="showPage('x')">x</button>
      <button onclick="showPage('about')">About</button>
    </div>
  </footer>

  <script>
    function showPage(page) {
      const content = document.getElementById("content");
      if (page === "home") {
        content.innerHTML = `
          <p>Ini laman utama untuk projek GAILNIREUS.</p>
        `;
      } else if (page === "about") {
        content.innerHTML = `
          <p>GAILNIREUS ialah website ringkas dengan tema gelap (black & grey).</p>
        `;
      } else if (page === "e") {
        content.innerHTML = `
          <p>e</p>
        `;
    } else if (page === "x") {
        content.innerHTML = `
          <p>x</p>
        `;
    }
  }
  </script>

</body>
</html>
